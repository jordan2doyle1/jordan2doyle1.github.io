  - title: Education
    layout: list
    content:
      - layout: top-middle
        title: School of Computer Science @ University College Dublin
        link: https://ucd.ie/cs/
        quote: >
          The School of Computer Science at University College Dublin is the largest computer science department in Ireland, with top ranking B.Sc. Honours, Masters, and structured Ph.D. degree programmes.
      - layout: left
        sub_title: Ph.D. in Computer Science
        caption: September 2017 - January 2024
        description: | # this will include new lines to allow paragraphs
          I completed my Ph.D. degree in [University College Dublin](https://ucd.ie) with the [Complex Software Laboratory](https://csl.scss.tcd.ie/). I learned the skills to conduct valuable research and effectively communicate and solve complex problems. Over the course of the degree, I published and presented three research papers at highly regarded conferences.

          The thesis for my Ph.D. focused on how I designed, implemented, and evaluated both a comprehensive model of Android mobile applications using a combination of static and dynamic analysis and an automated model-based approach to generate test inputs for Android mobile applications using those same models.

          <mark>Thesis</mark> [Automated Model-based Interface Test Generation for Mobile Applications](http://hdl.handle.net/10197/27470). University College Dublin, 2024.
      - layout: left
        sub_title: B.Sc. in Computer Science (2:1)
        caption: September 2013 - August 2017
        description: | # this will include new lines to allow paragraphs
          During my undergraduate degree at [University College Dublin](https://ucd.ie), I learnt lots of key skills such as teamwork and project management. The core of the degree focused on well-rounded background knowledge and practical skills, while later years focused on software development and the principles of programming.

          The final part of the degree was a final year project that included a research report and a presentation to the school of computer science faculty. For this project, I designed and implemented an end-to-end eReceipts delivery system consisting of a backend database and server, application layer protocol, and a mobile frontend application.
  - title: Publications
    layout: text
    content: | # this will include new lines to allow paragraphs
      <mark>Conference Paper</mark> **Jordan Doyle**, Thomas Laurent, and Anthony Ventresque. [PADRAIG: Precise Android Automated Input Generation](https://doi.org/10.1109/QRS62785.2024.00017). In [*2024 24th International Conference on Software Quality, Reliability, and Security (QRS)*](https://qrs24.techconf.org/), pages 72--83. IEEE, 2024

      <mark>Conference Paper</mark> **Jordan Doyle**, Thomas Laurent, and Anthony Ventresque. [Modelling android applications through static analysis and systematic exploratory testing](https://doi.org/10.1109/DSA59317.2023.00022). In [*2023 10th International Conference on Dependable Systems and Their Applications (DSA)*](https://dsa23.techconf.org/), pages 94–104. IEEE, 2023

      <mark>Conference Paper</mark> **Jordan Doyle**, Takfarinas Saber, Paolo Arcaini, and Anthony Ventresque. [Improving mobile user interface testing with model driven monkey search](https://doi.org/10.1109/ICSTW52544.2021.00034). In [*2021 IEEE International Conference on Software Testing, Verification and Validation Workshops (ICSTW)*](https://icst2021.icmc.usp.br/), pages 138–145. IEEE, 2021
  - title: Experience
    layout: list
    content:
      - layout: left
        border: weak
        title: Trinity College Dublin
        sub_title: Postdoctoral Researcher
        caption: April 2024 - Present
        link: https://tcd.ie/
        quote: >
          Trinity College Dublin is Ireland’s leading university, inspiring generations of brilliant thinkers for over 400 years. Ranked 1st in Ireland and 98th in the world, Trinity provides world-class education in a research-centred, collaborative environment.
        description: | # this will include new lines to allow paragraphs
          I am a member of the [Complex Software Laboratory](https://csl.scss.tcd.ie/) in [Trinity College Dublin](https://www.tcd.ie/), where I conduct research focused on improving the quality, reliability, and maintainability of complex software systems through the application of automated testing and test generation techniques.

          I currently work in collaboration with [ServiceNow](https://www.servicenow.com/) on the research and development of automated approaches for internationalisation (i18n) and localisation (l10n) testing, with the goal of identifying defects more efficiently and reducing the manual effort required during software quality assurance processes.

          Previously, I collaborated with [Fidelity Investments](https://www.fidelityinvestments.ie/) on automated accessibility testing, where I investigated approaches for detecting accessibility-related defects in web applications and evaluated the practical adoption of research tools within an industrial testing environment.
      - layout: left
        border: weak
        title: ServiceNow
        sub_title: AI Researcher
        caption: August 2025 - Present
        link: https://www.servicenow.com/
        quote: >
          ServiceNow is a fast-paced global leader in AI-driven digital workflow solutions, renowned for driving digital transformation and fostering a culture of innovation. ServiceNow is trusted by many of the world’s largest enterprises.
        description: | # this will include new lines to allow paragraphs
          While a postdoctoral researcher at [Trinity College Dublin](https://www.tcd.ie/), I am working in collaboration with [ServiceNow](https://www.servicenow.com/) on the research and development of automated approaches for internationalisation (i18n) and localisation (l10n) testing within large-scale software systems.

          Specifically, my work focuses on the design, implementation and evaluation of automated solutions capable of detecting i18n and l10n defects in the [ServiceNow](https://www.servicenow.com/) platform. The research involves investigating challenges associated with validating software behaviour across different languages, regions, and cultural settings, including issues related to translated content, user interface adaptation, and regional configuration.
      - layout: left
        border: weak
        title: Fidelity Investments
        sub_title: Research Software Engineer
        caption: April 2024 - April 2025
        link: https://www.fidelityinvestments.ie/
        quote: >
          Fidelity Investments is a recognised leader in financial services with a reputation for innovation, operational excellence, and strong governance. Known for it scale, stability, and commitment to excellence, Fidelity serves millions of customer globally.
        description: | # this will include new lines to allow paragraphs
          During my postdoctoral position at [Trinity College Dublin](https://www.tcd.ie/), I worked in collaboration with [Fidelity Investments](https://www.fidelityinvestments.ie/) on automated accessibility testing for modern web applications.

          The focus of my research was the development and deployment of an automated solution to detect element reflow defects that occur when accessibility features, such as browser zoom, or text scaling, are used. I extended and adapted existing research tools to integrate with Fidelity's enterprise testing environment and evaluated their effectiveness, usability, and scalability within an industry setting.
      - layout: left
        border: weak
        title: University College Dublin
        sub_title: Tutor, TA, and Demonstrator
        caption: September 2017 - January 2024
        link: https://ucd.ie/
        quote: >
          University College Dublin is Ireland's global university, with over 160 years of education, an environment where undergraduate education, master’s and Ph.D. training, research, innovation and community engagement form a dynamic spectrum of activity.
        description: | # this will include new lines to allow paragraphs
          Throughout my Ph.D., each semester, I assisted the teaching of both undergraduate and master’s level students in modules covering Functional Programming, Operating Systems, and Software Engineering within the [School of Computer Science](https://ucd.ie/cs/) in [University College Dublin](https://ucd.ie).

          Within the role of Teaching Assistant (TA), I coordinated a team of up to 10 demonstrators for modules of approximately 200 students. I organised and supervised the grading of student assignments, and module labs/practicals/tutorials. I was recognised as a distinguished teaching assistant for the 2023-2024 academic year.

          While a tutor for the [UCD Computer Science Support Centre (CSSC)](https://csintranet.ucd.ie/CSSC/), I provided one-on-one academic support for a wide-range of undergraduate Computer Science modules. I helped students with complex theoretical concepts, debugging programming assignments, and developing effective problem-solving strategies.
      - layout: left
        border: weak
        title: Movidius @ Intel
        sub_title: Test Automation Intern
        caption: January 2019 - June 2019
        link: https://movidius.com/
        quote: >
          Aquired by Intel in 2016 for 300 million, Movidius designs low-power processor chips for computer vision. Movidius VPU's enable demanding computer vision and AI workloads that achieve a balance of power efficiency, and compute performance.
        description: | # this will include new lines to allow paragraphs
          During my Ph.D., I completed an industry internship with [Movidius](https://movidius.com/), a company that designs low-power processing chips for computer vision, and was acquired by [Intel](https://intel.com/) in September 2016.

          While at [Movidius](https://movidius.com/), I researched integration testing methods for their newly developed Vision Processing Units (VPU's) and their accompanying development API platform. This required the development and configuration of a custom CI/CD pipeline that incorporated both functional and performance testing with direct access to in-development VPU's and dependency hardware.
      - layout: left
        border: weak
        title: Insight @ UCD
        sub_title: Software Engineering Intern
        caption: June 2017 - August 2017
        link: https://insight-centre.org/
        quote: >
          Insight is one of the largest data analytics centres in Europe, with over 220 industry partners, supporting over 450 researchers from Irelands leading ICT clusters in areas from Fundamentals of Data Science to Trustworthy AI.
        description: | # this will include new lines to allow paragraphs
          After completing my undergraduate degree, I did an internship with [Insight the SFI research centre for data analytics]( https://insight-centre.org/) at [University College Dublin](https://ucd.ie), where I worked alongside several physiotherapy researchers.

          I extended the features and improved the performance of an existing Android application. The application was designed to guide recent knee or hip replacement patients through post-surgery recovery exercises with real time visualisation and feedback using a Unity avatar. The collection of physiotherapy research data for Ph.D. students was also a key part of the project.
      - layout: left
        border: weak
        title: Bruwind @ VUB
        sub_title: Software Engineering Intern
        caption: June 2016 - August 2016
        link: https://avrg.vub.be/
        quote: >
          Bruwind has pioneered test and monitoring equipment, data-warehousing solutions and advanced analysis for the offshore wind industry, and currently operates monitoring equipment on 8 offshore wind turbine substructures in the Belgian North Sea.
        description: | # this will include new lines to allow paragraphs
          In the third year of my undergraduate degree, I completed an internship with [Bruwind - Brussels Wind Energy Research Institute](https://avrg.vub.be/) at [Vrije Universiteit Brussels](https://vub.be). This internship was a part of the [IEASTE](https://iaeste.org/) internship exchange program, providing professional experience and cross-cultural skills for students.

          While at [Bruwind](https://avrg.vub.be/), I extended the functionality and features of an existing web-based application that monitored, analysed and reported the stability of turbine farms in real time, while also collecting data for targeted design optimisations and life-time estimation of turbine substructures.
      - layout: left
        title: Intel Ireland
        sub_title: Software Engineering Intern
        caption: June 2014/15 - August 2014/15
        link: https://intel.com/
        quote: >
          Since 1989, Intel has invested over €30 billion in Ireland creating the most advanced industrial campus in Europe. Today, alongside advanced manufacturing, Intel in Ireland represents a diverse set of activities from cutting edge research to design.
        description: | # this will include new lines to allow paragraphs
          At the beginning of my undergraduate degree, I completed internships with [Intel](https://intel.com/), where I joined a team focused on developing a software suite to aid silicon manufacturing.

          My first summer with the team, I was responsible for the development of internal web applications that allowed the display, filtering, and update of data within relational databases. I also assisted a development team in migrating from Apache Subversion to a Git version control system.

          When I returned the following summer, I built a prototype sensor platform using an Intel Galileo Gen 2 board and Arduino sensor modules for deployment in Intel's silicon manufacturing environment. The platform collected environmental data for storage in an SQL database and a web application provided real time monitoring and visualisation of the data for the detection of manufacturing faults.

