about_content: | # this will include new lines to allow paragraphs
  I completed my Ph.D. at the [School of Computer Science](https://ucd.ie/cs/) in [University College Dublin](https://ucd.ie). I currently work as a postdoctoral researcher at the [School of Computer Science and Statistics](https://tcd.ie/scss/) in [Trinity College Dublin](https://tcd.ie/), where I am also affiliated with the [Complex Software Laboratory](https://csl.scss.tcd.ie/), [SFI Lero](https://lero.ie/), and I work in collaboration with [ServiceNow](https://www.servicenow.com/). My research interest lies primarily in advanced Software Engineering practices, specifically developing and enhancing automation workflows and test generation solutions.

  While my early work focused on an automated model-based approach to generate test inputs for Android applications, my current efforts focus on developing specialised testing frameworks - particularly those addressing internationalisation (i18n) and localisation (l10n) - to ensure global application compatibility. This work builds upon my previous collaborations, including research into automated accessibility (a11y) testing solutions for web applications at [Fidelity Investments](https://fidelityinvestments.ie/).

